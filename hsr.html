<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Stellaron Permission Slip 💫</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Nunito:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet"/>
<style>
  :root {
    --void: #060b18;
    --deep-space: #0a1128;
    --nebula: #0f1d3d;
    --panel: #111e3a;
    --border: #1e3260;
    --glow-blue: #4fa3f7;
    --glow-cyan: #38d9f5;
    --glow-gold: #f5c842;
    --glow-red: #ff4d6d;
    --glow-purple: #c084fc;
    --text-bright: #e8f4ff;
    --text-dim: #7899cc;
    --star: #ffffffcc;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    min-height: 100vh;
    background: var(--void);
    font-family: 'Nunito', sans-serif;
    color: var(--text-bright);
    overflow-x: hidden;
  }

  #starfield {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }
  .star {
    position: absolute;
    border-radius: 50%;
    background: var(--star);
    animation: twinkle ease-in-out infinite;
  }
  @keyframes twinkle {
    0%,100% { opacity: 0.15; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.5); }
  }

  .aurora {
    position: fixed;
    width: 180%; left: -40%;
    height: 320px;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
    z-index: 0;
    animation: drift ease-in-out infinite alternate;
  }
  .aurora-1 { top: -120px; background: radial-gradient(ellipse, rgba(79,163,247,0.12) 0%, transparent 70%); animation-duration: 14s; }
  .aurora-2 { top: 40%; background: radial-gradient(ellipse, rgba(192,132,252,0.08) 0%, transparent 70%); animation-duration: 18s; animation-delay: -6s; }
  @keyframes drift { from { transform: translateX(-5%); } to { transform: translateX(5%); } }

  .page {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem 4rem;
  }

  header {
    text-align: center;
    margin-bottom: 2rem;
  }
  .header-eyebrow {
    font-size: 0.72rem;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--glow-cyan);
    margin-bottom: 0.5rem;
    font-weight: 700;
  }
  header h1 {
    font-family: 'Cinzel', serif;
    font-size: clamp(1.6rem, 5vw, 2.8rem);
    font-weight: 900;
    background: linear-gradient(135deg, var(--glow-cyan), var(--text-bright), var(--glow-gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.2;
    letter-spacing: 1px;
  }
  header p {
    margin-top: 0.5rem;
    font-size: 0.88rem;
    color: var(--text-dim);
    font-weight: 600;
  }

  .card {
    width: min(520px, 94vw);
    background: linear-gradient(160deg, #0e1d3a, #080f22);
    border: 1px solid var(--border);
    border-radius: 20px;
    box-shadow:
      0 0 0 1px rgba(79,163,247,0.08),
      0 8px 60px rgba(0,0,0,0.6),
      inset 0 1px 0 rgba(79,163,247,0.12);
    padding: 2rem 1.8rem 2.4rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.6rem;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--glow-cyan), var(--glow-blue), transparent);
    opacity: 0.6;
  }

  .char-section { width: 100%; }
  .section-label {
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 0.8rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--border), transparent);
  }

  .char-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0.55rem;
  }
  .char-btn {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 0.7rem 0.3rem 0.6rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.3rem;
    cursor: pointer;
    transition: all 0.22s ease;
    position: relative;
    overflow: hidden;
  }
  .char-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--char-color, var(--glow-blue));
    opacity: 0;
    transition: opacity 0.22s;
  }
  .char-btn:hover::before { opacity: 0.08; }
  .char-btn.active {
    border-color: var(--char-color, var(--glow-blue));
    box-shadow: 0 0 16px color-mix(in srgb, var(--char-color, var(--glow-blue)) 40%, transparent);
  }
  .char-btn.active::before { opacity: 0.15; }
  .char-avatar {
    font-size: 2rem;
    line-height: 1;
    position: relative;
    z-index: 1;
    transition: transform 0.2s;
  }
  .char-btn:hover .char-avatar { transform: scale(1.15) translateY(-2px); }
  .char-btn.active .char-avatar { transform: scale(1.1); }
  .char-name {
    font-family: 'Cinzel', serif;
    font-size: 0.6rem;
    letter-spacing: 0.5px;
    color: var(--text-dim);
    position: relative;
    z-index: 1;
    font-weight: 600;
    transition: color 0.2s;
    text-align: center;
  }
  .char-btn.active .char-name { color: var(--text-bright); }
  .char-path {
    font-size: 0.55rem;
    color: var(--char-color, var(--glow-blue));
    position: relative;
    z-index: 1;
    font-weight: 700;
    letter-spacing: 0.3px;
  }

  .active-char-display {
    width: 100%;
    background: linear-gradient(135deg, rgba(79,163,247,0.05), rgba(16,29,58,0.8));
    border: 1px solid rgba(79,163,247,0.15);
    border-radius: 16px;
    padding: 1.2rem 1.4rem;
    display: flex;
    align-items: center;
    gap: 1.2rem;
    transition: all 0.4s ease;
  }
  .active-big-avatar {
    font-size: 3.8rem;
    line-height: 1;
    filter: drop-shadow(0 0 16px var(--char-color, var(--glow-blue)));
    transition: filter 0.4s;
    flex-shrink: 0;
    animation: floatChar 3s ease-in-out infinite;
  }
  @keyframes floatChar {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }
  .active-char-info { flex: 1; min-width: 0; }
  .active-char-name {
    font-family: 'Cinzel', serif;
    font-size: 1.15rem;
    font-weight: 700;
    background: linear-gradient(90deg, var(--char-color, var(--glow-blue)), var(--text-bright));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .active-char-path-tag {
    display: inline-block;
    margin-top: 0.3rem;
    padding: 2px 10px;
    border-radius: 20px;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    border: 1px solid var(--char-color, var(--glow-blue));
    color: var(--char-color, var(--glow-blue));
  }
  .active-char-quote {
    margin-top: 0.5rem;
    font-size: 0.8rem;
    color: var(--text-dim);
    font-style: italic;
    line-height: 1.5;
  }

  .divider {
    width: 100%;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border), transparent);
  }

  .sug-chips {
    width: 100%;
    display: flex;
    flex-wrap: wrap;
    gap: 0.45rem;
  }
  .sug-chip {
    padding: 0.35rem 0.9rem;
    background: rgba(30,50,96,0.6);
    border: 1px solid var(--border);
    border-radius: 20px;
    font-size: 0.76rem;
    color: var(--text-dim);
    font-weight: 700;
    cursor: pointer;
    font-family: 'Nunito', sans-serif;
    transition: all 0.18s;
  }
  .sug-chip:hover {
    border-color: var(--glow-cyan);
    color: var(--glow-cyan);
    background: rgba(56,217,245,0.08);
    transform: translateY(-1px);
  }

  .input-wrap {
    width: 100%;
    display: flex;
    gap: 0.6rem;
  }
  .request-input {
    flex: 1;
    background: rgba(10,17,40,0.8);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 0.75rem 1rem;
    font-family: 'Nunito', sans-serif;
    font-size: 0.92rem;
    color: var(--text-bright);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .request-input:focus {
    border-color: var(--glow-blue);
    box-shadow: 0 0 0 3px rgba(79,163,247,0.12);
  }
  .request-input::placeholder { color: #3a5285; }

  .ask-btn {
    padding: 0.75rem 1.3rem;
    background: linear-gradient(135deg, #1a4fa3, #2a6cf7);
    border: none;
    border-radius: 12px;
    color: #e8f4ff;
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: 0.82rem;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 20px rgba(42,108,247,0.35);
    white-space: nowrap;
    position: relative;
    overflow: hidden;
  }
  .ask-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, #2a6cf7, #38d9f5);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .ask-btn:hover::before { opacity: 1; }
  .ask-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 28px rgba(42,108,247,0.5); }
  .ask-btn:active { transform: scale(0.97); }
  .ask-btn span { position: relative; z-index: 1; }

  .response-area {
    width: 100%;
    background: rgba(8,13,30,0.7);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.3rem 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 0.8rem;
    opacity: 0;
    transform: translateY(12px) scale(0.98);
    transition: opacity 0.45s ease, transform 0.45s ease;
    position: relative;
    overflow: hidden;
  }
  .response-area::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 2px;
    background: var(--char-color, var(--glow-blue));
    opacity: 0.7;
  }
  .response-area.visible {
    opacity: 1;
    transform: translateY(0) scale(1);
  }

  .response-header {
    display: flex;
    align-items: center;
    gap: 0.7rem;
  }
  .response-avatar { font-size: 1.6rem; }
  .response-name-wrap { flex: 1; }
  .response-char-name {
    font-family: 'Cinzel', serif;
    font-size: 0.82rem;
    font-weight: 700;
    color: var(--text-bright);
  }
  .response-verdict {
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 2px 10px;
    border-radius: 10px;
    text-transform: uppercase;
    margin-top: 0.15rem;
    display: inline-block;
  }
  .verdict-yes { background: rgba(34,197,94,0.2); color: #4ade80; border: 1px solid rgba(74,222,128,0.3); }
  .verdict-no { background: rgba(239,68,68,0.2); color: #f87171; border: 1px solid rgba(248,113,113,0.3); }
  .verdict-hmm { background: rgba(245,200,66,0.2); color: #fbbf24; border: 1px solid rgba(251,191,36,0.3); }

  .response-text {
    font-size: 1rem;
    line-height: 1.7;
    color: var(--text-bright);
    font-style: italic;
    font-weight: 400;
  }
  .response-mood {
    font-size: 0.75rem;
    color: var(--text-dim);
    font-weight: 600;
    border-top: 1px solid var(--border);
    padding-top: 0.6rem;
    margin-top: 0.2rem;
  }

  .particle {
    position: fixed;
    pointer-events: none;
    font-size: 1.2rem;
    animation: burst 0.9s ease-out forwards;
    z-index: 99;
  }
  @keyframes burst {
    0% { opacity: 1; transform: translate(0,0) scale(1); }
    100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0.3); }
  }

  .shake-input { animation: shakeX 0.4s ease; border-color: var(--glow-red) !important; }
  @keyframes shakeX {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-5px); }
    80% { transform: translateX(5px); }
  }

  footer {
    position: relative; z-index: 1;
    margin-top: 1.5rem;
    text-align: center;
    font-size: 0.72rem;
    color: #2a4070;
    font-weight: 600;
    letter-spacing: 1px;
  }

  @media (max-width: 420px) {
    .char-grid { grid-template-columns: repeat(4, 1fr); gap: 0.4rem; }
    .card { padding: 1.4rem 1.1rem 1.8rem; gap: 1.2rem; }
  }
</style>
</head>
<body>

<div id="starfield"></div>
<div class="aurora aurora-1"></div>
<div class="aurora aurora-2"></div>

<div class="page">
  <header>
    <div class="header-eyebrow">✦ Stellaron Hunters × Astral Express ✦</div>
    <h1>Izin Pacaran<br/>HSR Edition</h1>
    <p>Minta izin ke husbu favoritmu sebelum ngapa-ngapain~ 🚂</p>
  </header>

  <div class="card">
    <div class="char-section">
      <div class="section-label">Pilih Husbu</div>
      <div class="char-grid" id="charGrid"></div>
    </div>

    <div class="active-char-display" id="activeDisplay">
      <div class="active-big-avatar" id="activeBigAvatar">✨</div>
      <div class="active-char-info">
        <div class="active-char-name" id="activeCharName">—</div>
        <div class="active-char-path-tag" id="activeCharPath">—</div>
        <div class="active-char-quote" id="activeCharQuote">Pilih karaktermu dulu~</div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="sug-chips" id="sugChips">
      <button class="sug-chip" onclick="fillRequest('pergi sama teman')">🌙 Pergi sama teman</button>
      <button class="sug-chip" onclick="fillRequest('beli figure baru')">🪄 Beli figure baru</button>
      <button class="sug-chip" onclick="fillRequest('main Honkai sampai pagi')">🎮 Main HSR sampai pagi</button>
      <button class="sug-chip" onclick="fillRequest('minta pelukan')">🫂 Minta pelukan</button>
      <button class="sug-chip" onclick="fillRequest('liburan sama bestie')">✈️ Liburan sama bestie</button>
      <button class="sug-chip" onclick="fillRequest('skip sekolah sehari')">🌸 Skip sekolah</button>
    </div>

    <div class="input-wrap">
      <input
        id="requestInput"
        class="request-input"
        type="text"
        placeholder="Aku mau... 🥺"
        onkeydown="if(event.key==='Enter') askPermission()"
        maxlength="120"
      />
      <button class="ask-btn" onclick="askPermission()"><span>Minta Izin ✦</span></button>
    </div>

    <div class="response-area" id="responseArea">
      <div class="response-header">
        <div class="response-avatar" id="resAvatar">✨</div>
        <div class="response-name-wrap">
          <div class="response-char-name" id="resName">—</div>
          <div class="response-verdict" id="resVerdict">—</div>
        </div>
      </div>
      <div class="response-text" id="resText">...</div>
      <div class="response-mood" id="resMood"></div>
    </div>
  </div>

  <footer>DOM Manipulation · Array · Math.random() · HSR Fan App</footer>
</div>

<script>
const characters = [
  {
    id: 'phainon',
    name: 'Phainon',
    avatar: '☄️',
    path: 'Destruction',
    color: '#ff6b35',
    quote: '"Aku sudah melihat akhir segalanya. Tapi kamu... kamu adalah pengecualian."',
    responses: [
      { text: '...Kamu minta izin dariku? {request}? Aku tidak berkuasa atas pilihanmu. Tapi kalau kamu tidak kembali tepat waktu, aku akan mencarimu sendiri.', verdict: 'yes', mood: 'Berdiri di tepi kapal sambil menatap bintang, menghitung menitmu pergi ☄️' },
      { text: '{request}. Hmh. Lakukan saja. Tapi dengarkan baik-baik — jangan buat aku khawatir.', verdict: 'yes', mood: 'Matanya tidak berkedip saat melepasmu pergi 👁️' },
      { text: 'Aku pernah menghancurkan bintang dengan tanganku sendiri. Tapi permintaanmu ini... kenapa rasanya lebih sulit untuk kujawab.', verdict: 'hmm', mood: 'Mengepalkan tangan, mencari kata yang tepat 🌑' },
      { text: '...Tidak. Terlalu berbahaya. Aku bisa merasakan sesuatu yang salah. Percayai insting destruksiku sekali ini.', verdict: 'no', mood: 'Matriksnya berputar, serius banget nih ☄️' },
      { text: 'Kalau itu yang kamu inginkan, pergi. Tapi aku akan merasakan kalau ada yang menyentuhmu. Pertimbangkan itu sebagai peringatan.', verdict: 'yes', mood: 'Senyum tipis yang membuat sekitarnya bergetar 💥' },
      { text: '{request}? ...Baiklah. Tapi kamu harus janji satu hal. Kembali padaku.', verdict: 'yes', mood: 'Ekspresinya tidak berubah, tapi tangannya terulur pelan 🤝' },
      { text: 'Aku tidak punya hak melarangmu. Tapi aku punya hak untuk menunggumu. Dan aku akan menunggu.', verdict: 'yes', mood: 'Duduk diam di ambang pintu seperti patung ☄️' },
    ]
  },
  {
    id: 'heng',
    name: 'Heng',
    avatar: '🐉',
    path: 'Remembrance',
    color: '#38d9f5',
    quote: '"Waktu adalah sungai. Aku hanya mencatat arusnya — dan kamu selalu muncul di setiap halamannya."',
    responses: [
      { text: 'Sebelum kujawab... sudahkah kamu minum air hari ini? {request} bisa menunggu, kesehatanmu tidak.', verdict: 'hmm', mood: 'Mengeluarkan catatan dan mulai menulis "Hari ke-sekian: ia masih merepotkan" 📖' },
      { text: 'Aku telah mencatat 3.782 permintaan serupa dalam arsip waktu. Jawabanku selalu sama: boleh. Tapi ingat pulang.', verdict: 'yes', mood: 'Tersenyum tipis, melipat lengan baju dengan rapi 🐉' },
      { text: '{request}? Hmm. Waktu akan berlalu tanpamu di sini, dan itu akan terasa aneh. Pergi saja, tapi ceritakan semuanya padaku nanti.', verdict: 'yes', mood: 'Menyeduh teh dua cangkir — satu untukmu saat kembali ☕' },
      { text: 'Izinku tidak perlu kamu minta. Tapi... aku senang kamu menanyakannya.', verdict: 'yes', mood: 'Menutup buku catatannya dan menatapmu langsung 🎋' },
      { text: 'Dalam setiap garis waktu yang pernah kulihat, kamu selalu membuat keputusan ini. Aku tidak akan melawan arus. Pergi.', verdict: 'yes', mood: 'Nada bicaranya datar tapi matanya hangat 🌊' },
      { text: 'Tidak. Bukan sekarang. Ada yang lebih penting yang ingin kuceritakan padamu — tentang hari ini, tentang kamu, tentang kenapa aku masih di sini.', verdict: 'no', mood: 'Membuka halaman yang sudah lama ia tandai ✨' },
      { text: '{request}... Kamu tahu aku tidak bisa menolakmu. Itu kelemahan yang tidak tercatat di mana pun, tapi nyata.', verdict: 'yes', mood: 'Mengacak-acak rambutnya sendiri, satu-satunya gerakan spontannya 🐉' },
    ]
  },
  {
    id: 'welt',
    name: 'Welt',
    avatar: '🎨',
    path: 'Nihility',
    color: '#a78bfa',
    quote: '"Di antara semua kisah yang pernah kuciptakan, kisahmu adalah yang paling menarik."',
    responses: [
      { text: '{request}? Tentu saja. Kamu tidak perlu meminta izinku, tapi aku menghargai bahwa kamu memberitahuku.', verdict: 'yes', mood: 'Menutup sketchbook dan memberikanmu perhatian penuh 🎨' },
      { text: 'Aku pernah melukis ribuan momen — tapi momen ketika kamu kembali selalu menjadi favoritku. Pergi dan ciptakan ceritamu.', verdict: 'yes', mood: 'Sudah menyiapkan kanvas untuk dilukis nanti 🖌️' },
      { text: 'Hmm... Ini mengingatkanku pada suatu kisah. Boleh aku cerita dulu sebentar sebelum kamu pergi?', verdict: 'hmm', mood: 'Sudah siap bercerita panjang, duduk nyaman ☕' },
      { text: 'Dengan senang hati. Hati-hati ya — bukan karena aku khawatir, tapi karena dunia belum siap kehilangan orang sepertimu.', verdict: 'yes', mood: 'Senyum paling tulus yang pernah kamu lihat 🎨' },
      { text: 'Tidak baik-baik saja, tapi boleh. Karena mencegahmu akan lebih tidak baik.', verdict: 'yes', mood: 'Memberikan syal hangatnya untuk dibawa 🧣' },
    ]
  },
  {
    id: 'blade',
    name: 'Blade',
    avatar: '⚔️',
    path: 'Destruction',
    color: '#f43f5e',
    quote: '"Aku tidak bisa mati. Tapi melihatmu pergi... itu rasa yang lebih buruk dari luka apapun."',
    responses: [

let selectedChar = characters[0];

function buildStars() {
  const sf = document.getElementById('starfield');
  for (let i = 0; i < 120; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2.5 + 0.5;
    s.style.cssText = `left:${Math.random()*100}vw;top:${Math.random()*100}vh;width:${size}px;height:${size}px;animation-duration:${2+Math.random()*5}s;animation-delay:${Math.random()*6}s;`;
    sf.appendChild(s);
  }
}
buildStars();

function buildGrid() {
  const grid = document.getElementById('charGrid');
  characters.forEach(ch => {
    const btn = document.createElement('button');
    btn.className = 'char-btn' + (ch.id === selectedChar.id ? ' active' : '');
    btn.dataset.id = ch.id;
    btn.style.setProperty('--char-color', ch.color);
    btn.innerHTML = `<div class="char-avatar">${ch.avatar}</div><div class="char-name">${ch.name.split(' ')[0]}</div><div class="char-path" style="color:${ch.color}">${ch.path.split(' ')[0]}</div>`;
    btn.onclick = () => selectChar(ch.id);
    grid.appendChild(btn);
  });
}
buildGrid();

function selectChar(id) {
  selectedChar = characters.find(c => c.id === id);
  document.querySelectorAll('.char-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.id === id);
  });
  const display = document.getElementById('activeDisplay');
  display.style.borderColor = selectedChar.color + '33';
  display.style.background = `linear-gradient(135deg, ${selectedChar.color}08, rgba(16,29,58,0.8))`;
  document.getElementById('activeBigAvatar').textContent = selectedChar.avatar;
  document.getElementById('activeBigAvatar').style.filter = `drop-shadow(0 0 18px ${selectedChar.color})`;
  document.getElementById('activeCharName').style.background = `linear-gradient(90deg, ${selectedChar.color}, #e8f4ff)`;
  document.getElementById('activeCharName').style.webkitBackgroundClip = 'text';
  document.getElementById('activeCharName').style.webkitTextFillColor = 'transparent';
  document.getElementById('activeCharName').textContent = selectedChar.name;
  document.getElementById('activeCharPath').textContent = selectedChar.path;
  document.getElementById('activeCharPath').style.borderColor = selectedChar.color;
  document.getElementById('activeCharPath').style.color = selectedChar.color;
  document.getElementById('activeCharQuote').textContent = selectedChar.quote;
  document.getElementById('responseArea').classList.remove('visible');
}

selectChar('phainon');

function fillRequest(text) {
  const input = document.getElementById('requestInput');
  input.value = text;
  input.focus();
}

function burst(x, y) {
  const emojis = ['✨','💫','⭐','🌟','💥','🌸','💠'];
  for (let i = 0; i < 8; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.textContent = emojis[Math.floor(Math.random()*emojis.length)];
    const angle = (i / 8) * 360;
    const dist = 60 + Math.random()*50;
    p.style.cssText = `left:${x}px;top:${y}px;--tx:${Math.cos(angle*Math.PI/180)*dist}px;--ty:${Math.sin(angle*Math.PI/180)*dist}px;`;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 900);
  }
}

function askPermission() {
  const input = document.getElementById('requestInput');
  const request = input.value.trim();
  if (!request) {
    input.classList.add('shake-input');
    setTimeout(() => input.classList.remove('shake-input'), 400);
    input.placeholder = 'Tulis dulu permintaanmu~ 🥺';
    setTimeout(() => input.placeholder = 'Aku mau... 🥺', 2200);
    return;
  }
  const pool = selectedChar.responses;
  const picked = pool[Math.floor(Math.random() * pool.length)];
  const finalText = picked.text.replace(/{request}/g, request);
  const verdictMap = {
    yes: { cls: 'verdict-yes', label: '✓ Diizinkan' },
    no: { cls: 'verdict-no', label: '✗ Ditolak' },
    hmm: { cls: 'verdict-hmm', label: '⟳ Bersyarat' },
  };
  const vd = verdictMap[picked.verdict];
  const area = document.getElementById('responseArea');
  area.classList.remove('visible');
  area.style.borderColor = selectedChar.color + '30';
  document.getElementById('resAvatar').textContent = selectedChar.avatar;
  document.getElementById('resName').textContent = selectedChar.name;
  document.getElementById('resName').style.color = selectedChar.color;
  const vTag = document.getElementById('resVerdict');
  vTag.textContent = vd.label;
  vTag.className = 'response-verdict ' + vd.cls;
  document.getElementById('resText').textContent = `"${finalText}"`;
  document.getElementById('resMood').textContent = picked.mood;
  void area.offsetWidth;
  requestAnimationFrame(() => area.classList.add('visible'));
  const btn = document.querySelector('.ask-btn');
  const rect = btn.getBoundingClientRect();
  burst(rect.left + rect.width/2, rect.top + rect.height/2);
}
